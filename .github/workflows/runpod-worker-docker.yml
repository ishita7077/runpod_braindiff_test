# Build and push the Runpod worker image (no local Docker required).
# Run: Actions → "Runpod worker Docker image" → Run workflow.
# Image: ghcr.io/<owner>/<repo>:runpod-latest (packages write uses GITHUB_TOKEN).

name: Runpod worker Docker image

on:
  workflow_dispatch:
  push:
    tags:
      - "runpod-worker-*"
    # Auto-rebuild on main whenever worker-relevant code changes. Without
    # this every backend/handler edit needed a manual trip to the Actions UI.
    branches:
      - main
    paths:
      - "runpod_worker/**"
      - "backend/**"
      - "atlases/**"
      - ".github/workflows/runpod-worker-docker.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          # GitHub Actions Ubuntu runners ship with Android SDK (~12 GB),
          # Haskell/GHCup (~4 GB), .NET (~2 GB), and CodeQL (~2 GB) that we
          # never use. Removing them frees ~20 GB — enough for the full
          # torch + tribev2 + whisperx Docker build.
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/dotnet
          sudo apt-get clean
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GHCR image name (lowercase)
        id: ghcr
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ghcr.outputs.image }}
          tags: |
            type=raw,value=runpod-latest
            type=sha,prefix=runpod-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runpod_worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
