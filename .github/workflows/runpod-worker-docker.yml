# Build and push the Runpod worker image (no local Docker required).
# Run: Actions → "Runpod worker Docker image" → Run workflow.
# Image: ghcr.io/<owner>/<repo>:runpod-latest (packages write uses GITHUB_TOKEN).

name: Runpod worker Docker image

on:
  workflow_dispatch:
  push:
    tags:
      - "runpod-worker-*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GHCR image name (lowercase)
        id: ghcr
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ghcr.outputs.image }}
          tags: |
            type=raw,value=runpod-latest
            type=sha,prefix=runpod-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runpod_worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
