<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#f7f4ec" />
<title>Brain Diff — Results</title>
<meta name="description" content="A Brain Diff comparison: two videos, two cortical recipes, no winner." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..400;1,6..72,300..400&family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..500&family=JetBrains+Mono:wght@300;400;500&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script>(function(){var r=document.documentElement;try{var t=localStorage.getItem('braindiff-theme');if(t==='dark')r.setAttribute('data-theme','dark');}catch(e){}})();</script>
<link rel="icon" href="data:," />
<style>
/* ── THEME VARS ───────────────────────────────────────────── */
:root {
  color-scheme: light;
  --shell-max: 1200px;
  --shell-pad-x: clamp(20px, 4.5vw, 52px);

  --bg: #f7f4ec; --bg-2: #efeadf; --bg-3: #e7e2d4;
  --surface: #ffffff; --panel: #ffffff; --panel-2: #f1ecde;
  --line: #e2ddcf; --line-2: #cbc5b4;
  --ink: #17171a; --ink-dim: #3d3d42; --ink-mute: #77736b;
  --accent: #c1272d; --accent-2: #d94a4e; --accent-dim: rgba(193,39,45,0.10);
  --good: #2a5583; --good-2: #4a78ab; --good-dim: rgba(42,85,131,0.10);
  --a-col: #3a7fa8; --b-col: #c1272d;
  --shadow-sm: 0 1px 2px rgba(20,20,25,.04), 0 1px 3px rgba(20,20,25,.05);
  --shadow-md: 0 1px 2px rgba(20,20,25,.04), 0 8px 24px rgba(20,20,25,.08);
}
:root[data-theme="dark"] {
  color-scheme: dark;
  --bg: #0b0c0f; --bg-2: #101116; --bg-3: #15171c;
  --surface: #15171c; --panel: rgba(20,22,28,.72); --panel-2: rgba(28,31,38,.58);
  --line: rgba(255,255,255,.07); --line-2: rgba(255,255,255,.14);
  --ink: #e8e4db; --ink-dim: #b6b1a6; --ink-mute: #7f7a70;
  --accent: #e04a2e; --accent-2: #f27455; --accent-dim: rgba(224,74,46,.12);
  --good: #6a97c9; --good-2: #8db2d4; --good-dim: rgba(106,151,201,.12);
  --a-col: #7FB3C6; --b-col: #E25B43;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.35);
  --shadow-md: 0 12px 32px rgba(0,0,0,.45);
}

/* ── BASE ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; scroll-padding-top: 80px; }
body {
  background:
    radial-gradient(1400px 700px at 78% -8%, color-mix(in srgb, var(--accent) 5%, transparent), transparent 55%),
    radial-gradient(1100px 600px at 12% 108%, color-mix(in srgb, var(--good) 5%, transparent), transparent 55%),
    var(--bg);
  color: var(--ink);
  font-family: 'Newsreader', Georgia, serif;
  font-size: 17px;
  line-height: 1.78;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
}
:root[data-theme="dark"] body {
  background:
    radial-gradient(1200px 600px at 78% -10%, color-mix(in srgb, var(--accent) 10%, transparent), transparent 55%),
    radial-gradient(900px 500px at 12% 110%, color-mix(in srgb, var(--good) 10%, transparent), transparent 55%),
    var(--bg);
}
strong { color: var(--ink); font-weight: 400; }
em { font-style: italic; color: var(--ink); }
code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--good); background: var(--good-dim); padding: 1px 5px; border-radius: 2px; }
.shell { max-width: var(--shell-max); margin: 0 auto; padding: 0 var(--shell-pad-x); }

/* ── THEME TOGGLE ─────────────────────────────────────────── */
.theme-switcher { position: fixed; top: 14px; right: 20px; z-index: 200; }
.theme-toggle { width: 34px; height: 34px; border-radius: 8px; background: var(--surface); border: 1px solid var(--line-2); color: var(--ink-mute); cursor: pointer; font-size: 14px; display: grid; place-items: center; box-shadow: var(--shadow-sm); font-family: inherit; transition: color .15s, border-color .15s; }
.theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
.theme-toggle .tt-moon { display: inline; } .theme-toggle .tt-sun { display: none; }
:root[data-theme="dark"] .theme-toggle .tt-sun { display: inline; }
:root[data-theme="dark"] .theme-toggle .tt-moon { display: none; }

/* ── TOPBAR ───────────────────────────────────────────────── */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 22px var(--shell-pad-x); max-width: var(--shell-max); margin: 0 auto; position: sticky; top: 0; z-index: 20; background: color-mix(in srgb, var(--bg) 84%, transparent); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--line); }
.brand { display: flex; align-items: center; gap: 10px; font-weight: 500; letter-spacing: -.022em; font-size: 15px; color: var(--ink); font-family: 'Inter Tight', system-ui, sans-serif; text-decoration: none; }
.brand-logo { height: 24px; width: auto; display: block; border-radius: 4px; }
.brand-word b { font-weight: 600; }
.nav { display: flex; gap: 28px; align-items: center; font-size: 13.5px; color: var(--ink-mute); font-family: 'Inter Tight', system-ui, sans-serif; }
.nav a { color: inherit; border: none; transition: color .15s; text-decoration: none; }
.nav a:hover { color: var(--ink); }
.nav-cta { padding: 8px 16px; border: 1px solid var(--line-2) !important; border-radius: 8px; color: var(--ink) !important; background: var(--surface); font-weight: 500; font-size: 13px; transition: all .15s !important; box-shadow: var(--shadow-sm); }
.nav-cta:hover { border-color: var(--accent) !important; color: var(--accent) !important; }
@media (max-width: 700px) { .nav a:not(.nav-cta) { display: none; } }

/* ── PAGE WRAPPER ─────────────────────────────────────────── */
.page { padding: 64px var(--shell-pad-x) 120px; max-width: var(--shell-max); margin: 0 auto; }

/* ── HERO ─────────────────────────────────────────────────── */
.hero { padding: 24px 0 56px; }
.hero-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--accent); margin-bottom: 22px; display: flex; align-items: center; gap: 14px; }
.hero-eyebrow .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.hero-headline { font-family: 'Fraunces', serif; font-size: clamp(34px, 5vw, 60px); font-weight: 300; line-height: 1.06; letter-spacing: -0.018em; color: var(--ink); margin-bottom: 28px; max-width: 18ch; }
.hero-headline em { font-style: italic; color: var(--accent); }
.hero-body { font-size: 18px; line-height: 1.75; color: var(--ink-dim); max-width: 60ch; }
.hero-versus { display: flex; gap: 36px; align-items: baseline; margin-top: 36px; font-family: 'Inter Tight', system-ui, sans-serif; font-size: 14px; color: var(--ink-mute); flex-wrap: wrap; }
.hero-versus b { color: var(--ink); font-weight: 500; letter-spacing: -.005em; }
.hero-versus .vs { color: var(--ink-mute); font-style: italic; font-family: 'Fraunces', serif; }

/* ── SECTION ──────────────────────────────────────────────── */
.section { margin-top: 96px; }
.section-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
.section-eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--line); }
.section-h2 { font-family: 'Fraunces', serif; font-size: clamp(26px, 3.4vw, 36px); font-weight: 400; line-height: 1.18; color: var(--ink); margin-bottom: 12px; max-width: 30ch; }
.section-h2 em { font-style: italic; color: var(--accent); }
.section-sub { color: var(--ink-dim); font-size: 16px; line-height: 1.7; max-width: 60ch; margin-bottom: 36px; }

/* ── STRATEGY INSIGHT (Frame 01: recipe match + description per video) */
.strategy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 760px) { .strategy-grid { grid-template-columns: 1fr; } }
.strategy-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 28px 28px 24px; box-shadow: var(--shadow-sm); position: relative; }
.strategy-card.video-a { border-top: 3px solid var(--a-col); }
.strategy-card.video-b { border-top: 3px solid var(--b-col); }
.sc-creator { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 8px; }
.sc-recipe-name { font-family: 'Fraunces', serif; font-style: italic; font-size: 22px; line-height: 1.18; color: var(--ink); margin-bottom: 4px; }
.sc-built-for { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin-bottom: 18px; }
.sc-confidence { float: right; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-mute); padding: 2px 8px; border: 1px solid var(--line); border-radius: 999px; }
.sc-description { color: var(--ink-dim); font-size: 15px; line-height: 1.7; }
.sc-description em { color: var(--accent); font-style: italic; font-weight: 400; }

/* ── CHORD MEANINGS LIBRARY (Frame 02) ─────────────────────── */
.chord-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
@media (max-width: 760px) { .chord-grid { grid-template-columns: 1fr; } }
.chord-card { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 22px 24px 20px; box-shadow: var(--shadow-sm); position: relative; }
.cc-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; gap: 12px; }
.cc-name { font-family: 'Fraunces', serif; font-style: italic; font-size: 19px; color: var(--ink); }
.cc-micro { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--accent); white-space: nowrap; }
.cc-formula { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--good); background: var(--good-dim); padding: 6px 10px; border-radius: 4px; margin-bottom: 12px; }
.cc-meaning { color: var(--ink-dim); font-size: 14.5px; line-height: 1.65; }

/* ── CHORD MOMENTS (per-firing context, Frame 03) ──────────── */
.moments-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
.moment-card { background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 16px 22px; display: grid; grid-template-columns: 110px 1fr 220px; gap: 18px; align-items: center; position: relative; }
@media (max-width: 760px) { .moment-card { grid-template-columns: 1fr; } }
.moment-card.video-a { border-left: 3px solid var(--a-col); }
.moment-card.video-b { border-left: 3px solid var(--b-col); }
.moment-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-mute); letter-spacing: .15em; text-transform: uppercase; line-height: 1.5; }
.moment-meta b { color: var(--ink); display: block; font-size: 11px; margin-top: 2px; letter-spacing: .12em; }
.moment-context { color: var(--ink-dim); font-size: 15px; line-height: 1.65; }
.moment-quote { font-family: 'Fraunces', serif; font-style: italic; font-size: 13px; color: var(--ink-mute); border-left: 2px solid var(--line-2); padding-left: 12px; }

/* ── COUPLING CALLOUTS (Frame 04: network coordination) ───── */
.callouts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 760px) { .callouts-grid { grid-template-columns: 1fr; } }
.callout-col { display: flex; flex-direction: column; gap: 14px; }
.callout-col-header { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 4px; }
.callout-col.video-a .callout-col-header b { color: var(--a-col); }
.callout-col.video-b .callout-col-header b { color: var(--b-col); }
.callout-card { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 16px 20px; box-shadow: var(--shadow-sm); position: relative; }
.callout-tag { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.callout-card.weakest .callout-tag { color: var(--good); }
.callout-card.anti .callout-tag { color: var(--ink-mute); }
.callout-text { color: var(--ink-dim); font-size: 14.5px; line-height: 1.65; }
.callout-reveal-btn { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-mute); background: transparent; border: 1px dashed var(--line-2); border-radius: 6px; padding: 10px 14px; cursor: pointer; transition: color .15s, border-color .15s; }
.callout-reveal-btn:hover { color: var(--accent); border-color: var(--accent); border-style: solid; }
.callout-card.is-hidden { display: none; }

/* ── SOURCE BADGES (dev mode only) ────────────────────────── */
.has-badge { position: relative; }
.src-badge { position: absolute; top: 6px; right: 8px; font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: .14em; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; color: white; pointer-events: none; opacity: .82; z-index: 1; }
.src-badge.src-llm      { background: var(--good); }
.src-badge.src-override { background: #7a5a9a; }
.src-badge.src-fallback { background: var(--ink-mute); }
.src-badge.src-library  { background: var(--accent); }
body:not(.dev-mode) .src-badge { display: none; }

/* ── DEV BANNER ───────────────────────────────────────────── */
.dev-banner { display: none; }
body.dev-mode .dev-banner { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; max-width: var(--shell-max); margin: 16px auto; padding: 10px 16px; background: color-mix(in srgb, var(--accent) 10%, var(--bg)); border: 1px solid var(--accent); border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink); }
.dev-banner code { background: transparent; color: var(--accent); }

/* ── ERROR / LOADING STATES ───────────────────────────────── */
.state-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 36px 30px; box-shadow: var(--shadow-sm); margin: 64px auto; max-width: 600px; text-align: center; }
.state-card h3 { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400; color: var(--ink); margin-bottom: 12px; }
.state-card p { color: var(--ink-dim); font-size: 15px; line-height: 1.65; }
.state-card.error h3 { color: var(--accent); }
.state-card code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink); background: var(--bg-2); padding: 2px 8px; border-radius: 3px; }

/* ── REVEAL ANIMATIONS ────────────────────────────────────── */
.reveal { opacity: 0; transform: translateY(22px); transition: opacity 0.58s cubic-bezier(.22,.8,.34,1), transform 0.58s cubic-bezier(.22,.8,.34,1); }
.reveal.is-vis { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: 0.08s; }
.reveal-delay-2 { transition-delay: 0.16s; }
.reveal-delay-3 { transition-delay: 0.24s; }

/* ── FOOTER ───────────────────────────────────────────────── */
.footer { border-top: 1px solid var(--line); margin-top: 120px; padding: 32px 0; text-align: center; color: var(--ink-mute); font-family: 'Inter Tight', system-ui, sans-serif; font-size: 13px; }
.footer a { color: var(--ink-mute); text-decoration: none; border-bottom: 1px solid color-mix(in srgb, var(--ink-mute) 40%, transparent); transition: color .15s; }
.footer a:hover { color: var(--accent); }
.footer .meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .14em; color: var(--ink-mute); margin-top: 10px; }

</style>
</head>
<body>

<div class="theme-switcher">
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span class="tt-sun">☀</span><span class="tt-moon">☾</span>
  </button>
</div>

<header class="topbar">
  <a href="/" class="brand">
    <img class="brand-logo" src="./assets/braindiff-logo.png" alt="BrainDiff logo" />
    <span class="brand-word">Brain<b>Diff</b></span>
  </a>
  <nav class="nav">
    <a href="/research">Research</a>
    <a href="/methodology">Methodology</a>
    <a href="/launch" class="nav-cta">Launch →</a>
  </nav>
</header>

<div class="dev-banner">
  <span>DEV MODE — source badges visible. <code id="dev-comparison-id"></code></span>
  <span>Append <code>?dev=0</code> to hide.</span>
</div>

<main class="page" id="page-root">
  <div class="state-card" id="loading">
    <h3>Loading comparison…</h3>
    <p>Reading <code id="loading-path">content.json</code></p>
  </div>
</main>

<footer class="footer">
  <span>Brain Diff</span>
  <span> · </span>
  <a href="/methodology">Methodology</a>
  <span> · </span>
  <a href="/research">Research</a>
  <div class="meta" id="footer-meta"></div>
</footer>

<script>
// ────────────────────────────────────────────────────────────
// Theme toggle
// ────────────────────────────────────────────────────────────
function toggleTheme() {
  var r = document.documentElement;
  var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  if (next === 'dark') r.setAttribute('data-theme', 'dark');
  else r.removeAttribute('data-theme');
  try { localStorage.setItem('braindiff-theme', next); } catch(e) {}
}

// ────────────────────────────────────────────────────────────
// URL params: ?id={comparison_id}&dev=1
// ────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const COMPARISON_ID = params.get('id');
const DEV_MODE = params.get('dev') !== '0';  // dev on by default until production deploy
if (DEV_MODE) document.body.classList.add('dev-mode');

// content.json source. /outputs/* served statically by Vercel rewrite.
const CONTENT_URL = COMPARISON_ID ? `/outputs/${COMPARISON_ID}/content.json` : null;

// ────────────────────────────────────────────────────────────
// Boot
// ────────────────────────────────────────────────────────────
async function loadAndRender() {
  if (!COMPARISON_ID) {
    return renderError(
      'No comparison ID in URL',
      `Add <code>?id=&lt;comparison_id&gt;</code>. Example: <code>/results.html?id=6b4cf129dfb0bd3a</code>`
    );
  }

  document.getElementById('loading-path').textContent = CONTENT_URL;

  let content;
  try {
    const res = await fetch(CONTENT_URL, { cache: 'no-cache' });
    if (!res.ok) {
      return renderError(
        'content.json not found',
        `Got HTTP ${res.status} from <code>${CONTENT_URL}</code>. Has the generator been run for this comparison?`
      );
    }
    content = await res.json();
  } catch (err) {
    return renderError('Failed to load content.json', `<code>${err.message}</code>`);
  }

  if (content.schema_version !== 'results_content.v1') {
    return renderError(
      'Schema version mismatch',
      `Expected <code>results_content.v1</code>, got <code>${content.schema_version}</code>. Frontend and backend are out of sync.`
    );
  }

  document.getElementById('dev-comparison-id').textContent =
    `comparison_id=${content.comparison_id} · run_id=${content.run_id.slice(0, 8)}…`;

  renderPage(content);
  initRevealAnimations();
}

function renderError(title, html) {
  document.getElementById('page-root').innerHTML = `
    <div class="state-card error">
      <h3>${escapeHtml(title)}</h3>
      <p>${html}</p>
    </div>`;
}

// ────────────────────────────────────────────────────────────
// Page renderer
// ────────────────────────────────────────────────────────────
function renderPage(c) {
  const root = document.getElementById('page-root');
  const va = c.videos.video_a;
  const vb = c.videos.video_b;

  root.innerHTML = `
    ${renderHero(c, va, vb)}
    ${renderStrategy(c, va, vb)}
    ${renderChordLibrary(c)}
    ${renderChordMoments(c, va, vb)}
    ${renderCouplingCallouts(c, va, vb)}
  `;

  document.getElementById('footer-meta').textContent =
    `comparison_id=${c.comparison_id} · ${c.analysis_version} · voice_hash=${c.assets.voice_exemplars_hash}`;

  document.querySelectorAll('.callout-reveal-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.getElementById(btn.dataset.target);
      if (target) {
        target.classList.remove('is-hidden');
        btn.style.display = 'none';
      }
    });
  });
}

// ────────────────────────────────────────────────────────────
// Sections
// ────────────────────────────────────────────────────────────
function renderHero(c, va, vb) {
  const headline = c.slots.headline;
  const body = c.slots.body;
  return `
    <section class="hero">
      <div class="hero-eyebrow reveal"><span class="dot"></span><span>A Brain Diff comparison</span></div>
      <h1 class="hero-headline reveal reveal-delay-1 has-badge">
        ${badge(headline)}${escapeHtml(headline.value)}
      </h1>
      <p class="hero-body reveal reveal-delay-2 has-badge">
        ${badge(body)}${escapeHtml(body.value)}
      </p>
      <div class="hero-versus reveal reveal-delay-3">
        <span><b>${escapeHtml(va.display_name)}</b></span>
        <span class="vs">— vs —</span>
        <span><b>${escapeHtml(vb.display_name)}</b></span>
        <span> · ${va.duration_seconds || 60}s runtime</span>
      </div>
    </section>`;
}

function renderStrategy(c, va, vb) {
  return `
    <section class="section">
      <div class="section-eyebrow reveal"><span>01</span> Strategy insight</div>
      <h2 class="section-h2 reveal reveal-delay-1">The recipe each <em>video</em> is running.</h2>
      <p class="section-sub reveal reveal-delay-2">Each video's cortical signature was matched to a recipe in the Brain Diff library. Same brain, different plays.</p>
      <div class="strategy-grid">
        ${strategyCard('a', va, c.slots.recipe_match.video_a, c.slots.recipe_description.video_a)}
        ${strategyCard('b', vb, c.slots.recipe_match.video_b, c.slots.recipe_description.video_b)}
      </div>
    </section>`;
}

function strategyCard(letter, video, matchSlot, descSlot) {
  const m = matchSlot.value;
  const builtFor = m.built_for_tag || (m.library_id === 'uncategorized' ? 'novel pattern' : 'this play');
  return `
    <div class="strategy-card video-${letter} reveal reveal-delay-${letter === 'a' ? 1 : 2} has-badge">
      ${badge(matchSlot)}
      <div class="sc-creator">${escapeHtml(video.display_name || video.id)}</div>
      <div>
        <span class="sc-confidence">conf ${(m.confidence * 100).toFixed(0)}%</span>
        <div class="sc-recipe-name">${escapeHtml(m.name || m.library_id)}</div>
      </div>
      <div class="sc-built-for">→ Built for ${escapeHtml(builtFor)}</div>
      <p class="sc-description has-badge" style="position:relative">${badge(descSlot)}${richText(descSlot.value)}</p>
    </div>`;
}

function renderChordLibrary(c) {
  const meanings = Object.values(c.slots.chord_meanings || {});
  if (!meanings.length) return '';
  return `
    <section class="section">
      <div class="section-eyebrow reveal"><span>02</span> Chord library</div>
      <h2 class="section-h2 reveal reveal-delay-1">The <em>moves</em> the cortex makes.</h2>
      <p class="section-sub reveal reveal-delay-2">A chord fires when two cortical systems cross threshold together for at least a second or two. Below: the chord types Brain Diff detects.</p>
      <div class="chord-grid">
        ${meanings.map((m, i) => chordCard(m, i)).join('')}
      </div>
    </section>`;
}

function chordCard(meaningSlot, i) {
  const m = meaningSlot.value;
  return `
    <div class="chord-card reveal reveal-delay-${(i % 3) + 1} has-badge">
      ${badge(meaningSlot)}
      <div class="cc-header">
        <span class="cc-name">${escapeHtml(m.name)}</span>
        <span class="cc-micro">${escapeHtml(m.micro_label)}</span>
      </div>
      <div class="cc-formula">${escapeHtml(m.formula_human)}</div>
      <p class="cc-meaning">${escapeHtml(m.meaning)}</p>
    </div>`;
}

function renderChordMoments(c, va, vb) {
  const moments = c.slots.chord_moments || [];
  if (!moments.length) return '';
  const ordered = [...moments].sort((p, q) => p.timestamp_seconds - q.timestamp_seconds);
  const meanings = c.slots.chord_meanings || {};

  return `
    <section class="section">
      <div class="section-eyebrow reveal"><span>03</span> Chord progression</div>
      <h2 class="section-h2 reveal reveal-delay-1">The <em>chords</em> each video fires.</h2>
      <p class="section-sub reveal reveal-delay-2 has-badge" style="position:relative">
        ${badge(c.slots.frame2_sub)}${escapeHtml(c.slots.frame2_sub.value)}
      </p>
      <div class="moments-grid">
        ${ordered.map((mom, i) => momentCard(mom, meanings, va, vb, i)).join('')}
      </div>
    </section>`;
}

function momentCard(mom, meanings, va, vb, i) {
  const meaning = (meanings[mom.chord_id] && meanings[mom.chord_id].value) || { name: mom.chord_id };
  const video = mom.video === 'video_a' ? va : vb;
  return `
    <div class="moment-card video-${mom.video.slice(-1)} reveal reveal-delay-${(i % 3) + 1} has-badge">
      ${badge(mom.context)}
      <div class="moment-meta">
        <b>${escapeHtml(meaning.name)}</b>
        ${escapeHtml(video.display_name || video.id)}<br>
        ${formatTime(mom.timestamp_seconds)}
      </div>
      <div class="moment-context">${escapeHtml(mom.context.value)}</div>
      ${mom.quote ? `<div class="moment-quote">"${escapeHtml(mom.quote)}"</div>` : '<div></div>'}
    </div>`;
}

function renderCouplingCallouts(c, va, vb) {
  const callouts = c.slots.coupling_callouts || {};
  return `
    <section class="section">
      <div class="section-eyebrow reveal"><span>04</span> Network coordination</div>
      <h2 class="section-h2 reveal reveal-delay-1">How each <em>recipe</em> wires the network.</h2>
      <p class="section-sub reveal reveal-delay-2">Within each video, some cortical systems rose together; others stayed independent or actively suppressed each other. The pattern IS the strategy.</p>
      <div class="callouts-grid">
        ${calloutColumn('a', va, callouts.video_a)}
        ${calloutColumn('b', vb, callouts.video_b)}
      </div>
    </section>`;
}

function calloutColumn(letter, video, pair) {
  if (!pair) return '<div></div>';
  const hidId = `callout-anti-${letter}`;
  return `
    <div class="callout-col video-${letter}">
      <div class="callout-col-header reveal">${escapeHtml(video.display_name || video.id)} — <b>coupling pattern</b></div>
      ${calloutCard('strongest', 'Strongest coupling', pair.strongest, false, '', 1)}
      ${calloutCard('weakest', 'Weakest coupling', pair.weakest, false, '', 2)}
      ${calloutCard('anti', 'Anti-coupling', pair.anti, true, hidId, 3)}
      <button class="callout-reveal-btn" data-target="${hidId}">Reveal anti-coupling →</button>
    </div>`;
}

function calloutCard(klass, tag, slot, hidden, idAttr, delay) {
  if (!slot) return '';
  return `
    <div class="callout-card ${klass} ${hidden ? 'is-hidden' : ''} reveal reveal-delay-${delay} has-badge"${idAttr ? ` id="${idAttr}"` : ''}>
      ${badge(slot)}
      <div class="callout-tag">${escapeHtml(tag)}</div>
      <div class="callout-text">${escapeHtml(slot.value)}</div>
    </div>`;
}

// ────────────────────────────────────────────────────────────
// Helpers
// ────────────────────────────────────────────────────────────
function badge(slot) {
  if (!slot || !slot.source) return '';
  return `<span class="src-badge src-${slot.source}">${slot.source}</span>`;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function richText(s) {
  if (s == null) return '';
  let safe = escapeHtml(s);
  safe = safe.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  return safe;
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ────────────────────────────────────────────────────────────
// Scroll reveal (matches methodology + research)
// ────────────────────────────────────────────────────────────
function initRevealAnimations() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-vis');
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -60px 0px' });

  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

loadAndRender();
</script>

</body>
</html>
